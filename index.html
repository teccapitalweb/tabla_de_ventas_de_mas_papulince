<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tablero de Ventas — IPCI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f5f6fa;color:#333;overflow-x:hidden}
    @keyframes fadePhrase{0%{opacity:0;transform:translateY(8px)}10%{opacity:1;transform:translateY(0)}90%{opacity:1}100%{opacity:0;transform:translateY(-8px)}}
    @keyframes confettiFall{0%{transform:translateY(-10vh) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
    @keyframes celebPop{0%{transform:scale(.5);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
    @keyframes pulseBar{0%{filter:brightness(1)}50%{filter:brightness(1.4) saturate(1.3)}100%{filter:brightness(1)}}
    @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes popIn{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
    @keyframes fireGlow{0%{box-shadow:0 0 10px #ff4500,0 0 20px #ff6a00,0 0 40px #ff4500}50%{box-shadow:0 0 20px #ff0000,0 0 40px #ff6a00,0 0 60px #ff0000}100%{box-shadow:0 0 10px #ff4500,0 0 20px #ff6a00,0 0 40px #ff4500}}
    @keyframes warmPulse{0%{box-shadow:0 0 8px #ff9800,0 0 16px #ffc10730}50%{box-shadow:0 0 16px #ff9800,0 0 30px #ffc10750}100%{box-shadow:0 0 8px #ff9800,0 0 16px #ffc10730}}
    @keyframes coolGlow{0%{box-shadow:0 0 6px #0078b340}50%{box-shadow:0 0 14px #0078b360}100%{box-shadow:0 0 6px #0078b340}}
    @keyframes textFire{0%{text-shadow:0 0 4px #ff4500,0 0 10px #ff6a00}50%{text-shadow:0 0 8px #ff0000,0 0 20px #ff4500,0 0 30px #ff6a00}100%{text-shadow:0 0 4px #ff4500,0 0 10px #ff6a00}}
    @keyframes shakeIt{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}
    @keyframes countdownPulse{0%,100%{opacity:1}50%{opacity:.7}}
    @keyframes leaderFire{0%{box-shadow:0 0 8px #FFD700,0 0 16px #ff6a00,0 0 24px #FFD700;filter:brightness(1.1)}50%{box-shadow:0 0 16px #ff4500,0 0 32px #FFD700,0 0 48px #ff6a00;filter:brightness(1.3)}100%{box-shadow:0 0 8px #FFD700,0 0 16px #ff6a00,0 0 24px #FFD700;filter:brightness(1.1)}}
    @keyframes tickerScroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
    @keyframes streakPop{0%{transform:scale(0) rotate(-10deg);opacity:0}50%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
    @keyframes teamPop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
    @keyframes numberRoll{0%{transform:translateY(-100%);opacity:0}100%{transform:translateY(0);opacity:1}}
    .bar-touch{cursor:pointer;transition:transform .2s;-webkit-tap-highlight-color:transparent;user-select:none}
    .bar-touch:hover{transform:translateY(-4px)}.bar-touch:active{transform:scale(.96)}
    .bar-touch:hover .bfi{filter:brightness(1.15)}
    .btn-a{border:none;border-radius:8px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
    .btn-a:hover{transform:scale(1.05)}.btn-a:active{transform:scale(.95)}
    .inp{background:#fff;border:1.5px solid #ddd;color:#333;border-radius:8px;padding:9px 12px;font-size:14px;outline:none;font-family:inherit;width:100%}
    .inp:focus{border-color:#0078B3;box-shadow:0 0 0 3px rgba(0,120,179,.15)}
    select.inp option{background:#fff}
    .card{background:#fff;border-radius:12px;padding:14px;border:1px solid #eee;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .tab-btn{padding:8px 14px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
    .chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:2px solid #ddd;background:#fff;user-select:none}
    .chip:hover{border-color:#0078B3}
    .chip.active{background:#0078B3;color:#fff;border-color:#0078B3}
    .ov{position:fixed;inset:0;z-index:900;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(8px)}
    @media(max-width:768px){.ml{flex-direction:column!important}.sb{width:100%!important;border-left:none!important;border-top:1px solid #eee;max-height:50vh}}
  </style>
</head>

function gid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,6)}
function ld(){try{return JSON.parse(localStorage.getItem("tablero-ipci"))||null}catch(e){return null}}
function sv(v,g,cp,ce){try{localStorage.setItem("tablero-ipci",JSON.stringify({v,g,cp,ce}))}catch(e){}}
const initV=CS.map((c,i)=>({id:gid()+i,n:"",c:c,v:0}));

function App(){
  const s0=useRef(ld());
  const[vds,setVds]=useState(s0.current?.v?.length?s0.current.v:initV);
  const[gps,setGps]=useState(s0.current?.g||[]);
  const comInit=s0.current;
  useEffect(()=>{if(comInit?.cp)setComMXN(comInit.cp);if(comInit?.ce&&comInit.ce>Date.now())setComEnd(comInit.ce)},[]);
  const[fi,setFi]=useState(0);
  const[sa,setSa]=useState(false);
  const[at,setAt]=useState("ventas");
  const[sc,setSc]=useState(false);
  const[win,setWin]=useState(null);
  const[pid,setPid]=useState(null);
  const[cf,setCf]=useState([]);
  const[nn,setNn]=useState("");
  const[nc,setNc]=useState(CS[0]);
  const[ei,setEi]=useState(null);
  const[en,setEn]=useState("");
  const[ec,setEc]=useState("");
  const[sb,setSb]=useState(null);
  const[gn,setGn]=useState("");
  const[gs,setGs]=useState([]);
  const[eg,setEg]=useState(null);
  const[comMXN,setComMXN]=useState(12);
  const[comEnd,setComEnd]=useState(null);
  const[comTL,setComTL]=useState(null);
  const[comH,setComH]=useState(9);
  const[feed,setFeed]=useState([]);
  const[fs,setFs]=useState(false);
  const[streaks,setStreaks]=useState({});
  const[aStreaks,setAStreaks]=useState({});
  const[tTotal,setTTotal]=useState(0);
  const[tAnim,setTAnim]=useState(false);
  const actx=React.useRef(null);

  useEffect(()=>{sv(vds,gps,comMXN,comEnd)},[vds,gps,comMXN,comEnd]);
  useEffect(()=>{
    if(!comEnd){setComTL(null);return}
    const tick=()=>{const l=Math.max(0,Math.floor((comEnd-Date.now())/1000));setComTL(l);if(l<=0)setComEnd(null)};
    tick();const i=setInterval(tick,1000);return()=>clearInterval(i);
  },[comEnd]);
  // Team total
  useEffect(()=>{const t=vds.reduce((s,v)=>s+v.v,0);if(t!==tTotal){setTTotal(t);setTAnim(true);setTimeout(()=>setTAnim(false),600)}},[vds]);
  // Sounds
  const pSnd=useCallback((type)=>{try{if(!actx.current)actx.current=new(window.AudioContext||window.webkitAudioContext)();const c=actx.current,g=c.createGain();g.connect(c.destination);

                      <button className="btn-a" onClick={()=>{setEg(null);setGn("");setGs([])}} style={{flex:1,background:"#eee",color:"#666",padding:10,fontSize:13,borderRadius:8}}>✕</button>
                    </>):(
                      <button className="btn-a" onClick={cg} style={{flex:1,background:gs.length>=2?"#0078B3":"#ccc",color:"#fff",padding:10,fontSize:13,borderRadius:8,cursor:gs.length>=2?"pointer":"not-allowed"}}>
                        🔗 Unir ({gs.length})</button>
                    )}
                  </div>
                </div>
                {gps.length>0&&(<div className="card">
                  <div style={{fontSize:11,fontWeight:700,marginBottom:8,color:"#888",letterSpacing:1}}>GRUPOS ACTIVOS ({gps.length})</div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {gps.map(g=><div key={g.id} style={{padding:10,background:"#f5f5f5",borderRadius:10,border:"1px solid #eee"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                        <div style={{flex:1,fontSize:14,fontWeight:700,color:"#333"}}>{g.nm}</div>
                        <button className="btn-a" onClick={()=>seg(g)} style={{background:"#eef5ff",color:"#0078B3",padding:"4px 8px",fontSize:11,borderRadius:5}}>✏️</button>
                        <button className="btn-a" onClick={()=>elg(g.id)} style={{background:"#fee",color:"#e55",padding:"4px 8px",fontSize:11,borderRadius:5}}>Separar</button>
                      </div>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {g.m.map(c=><div key={c} style={{display:"flex",alignItems:"center",gap:3,background:"#fff",borderRadius:6,padding:"3px 8px",fontSize:11,fontWeight:600,border:"1px solid #eee"}}>
                          {LOGOS[c]&&<img src={LOGOS[c]} alt="" style={{width:16,height:16,borderRadius:3}}/>}{c}</div>)}
                      </div>
                    </div>)}
                  </div>
                </div>)}
                {gps.length===0&&<div style={{textAlign:"center",padding:20,color:"#bbb",fontSize:13}}>No hay grupos. Selecciona 2+ consultoras y únelas.</div>}
              </div>
            )}

            {at==="comision"&&(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div className="card">
                  <div style={{fontSize:11,fontWeight:700,marginBottom:10,color:"#888",letterSpacing:1}}>COMISIÓN POR VENTA (MXN)</div>
                  <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                    <button className="btn-a" onClick={()=>setComMXN(p=>Math.max(12,p-1))}
                      style={{width:40,height:40,background:"#fee",color:"#e55",fontSize:20,padding:0,borderRadius:10}}>−</button>
                    <div style={{flex:1,textAlign:"center",fontSize:44,fontWeight:900,
                      color:cLv==="high"?"#e50000":cLv==="mid"?"#ff9800":"#0078B3"}}>{"$"+comMXN}</div>
                    <button className="btn-a" onClick={()=>setComMXN(p=>Math.min(30,p+1))}
                      style={{width:40,height:40,background:cLv==="high"?"#e50000":cLv==="mid"?"#ff9800":"#0078B3",
                        color:"#fff",fontSize:20,padding:0,borderRadius:10}}>+</button>
                  </div>
                  <input type="range" min="12" max="30" value={comMXN} onChange={e=>setComMXN(Number(e.target.value))}
                    style={{width:"100%",marginBottom:8,accentColor:cLv==="high"?"#e50000":cLv==="mid"?"#ff9800":"#0078B3"}}/>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#aaa",fontWeight:600}}>
                    <span>$12-17 💎</span><span>$18-24 ⚡</span><span>$25-30 🔥</span></div>
                </div>
                <div className="card">
                  <div style={{fontSize:11,fontWeight:700,marginBottom:10,color:"#888",letterSpacing:1}}>TEMPORIZADOR</div>
                  {tmrOn?(
                    <div style={{textAlign:"center"}}>
                      <div style={{fontSize:36,fontWeight:900,fontFamily:"'Courier New',monospace",
                        color:cLv==="high"?"#e50000":cLv==="mid"?"#ff9800":"#0078B3",letterSpacing:3,marginBottom:10}}>{fmtT(comTL)}</div>
                      <button className="btn-a" onClick={stopTmr}
                        style={{width:"100%",background:"#fee",color:"#e55",padding:10,fontSize:14,borderRadius:8}}>⏹ Detener</button>
                    </div>
                  ):(
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                        <button className="btn-a" onClick={()=>setComH(p=>Math.max(1,p-1))}
                          style={{width:36,height:36,background:"#eee",color:"#666",fontSize:18,padding:0,borderRadius:8}}>−</button>
                        <div style={{flex:1,textAlign:"center",fontSize:32,fontWeight:900,color:"#333"}}>{comH}h</div>
                        <button className="btn-a" onClick={()=>setComH(p=>Math.min(24,p+1))}
                          style={{width:36,height:36,background:"#eee",color:"#666",fontSize:18,padding:0,borderRadius:8}}>+</button>
                      </div>
                      <button className="btn-a" onClick={startTmr}
                        style={{width:"100%",
                          background:cLv==="high"?"linear-gradient(135deg,#e50000,#ff6a00)":cLv==="mid"?"linear-gradient(135deg,#ff9800,#ffc107)":"linear-gradient(135deg,#0078B3,#00B4D8)",
                          color:"#fff",padding:12,fontSize:15,fontWeight:800,borderRadius:10}}>
                        {"🚀 Activar $"+comMXN+" por "+comH+"h"}
                      </button>
                    </div>
                  )}
                </div>
              </div>
            )}

            {at==="manage"&&(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div className="card">
                  <div style={{fontSize:11,fontWeight:700,marginBottom:8,color:"#888",letterSpacing:1}}>AGREGAR VENDEDOR</div>
                  <input className="inp" value={nn} onChange={e=>setNn(e.target.value)} placeholder="Nombre (opcional)" style={{marginBottom:6}}/>
                  <select className="inp" value={nc} onChange={e=>setNc(e.target.value)} style={{marginBottom:8}}>
                    {CS.map(c=><option key={c} value={c}>{c}</option>)}</select>
                  <button className="btn-a" onClick={av} style={{width:"100%",background:"#0078B3",color:"#fff",borderRadius:8,padding:10,fontSize:14}}>+ Agregar</button>
                </div>
                <div className="card">
                  <div style={{fontSize:11,fontWeight:700,marginBottom:8,color:"#888",letterSpacing:1}}>VENDEDORES ({vds.length})</div>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {vds.map(v=><div key={v.id} style={{padding:8,background:"#f5f5f5",borderRadius:8,border:"1px solid #eee"}}>
                      {ei===v.id?(
                        <div style={{display:"flex",flexDirection:"column",gap:5}}>
                          <input className="inp" value={en} onChange={e=>setEn(e.target.value)} placeholder="Nombre" style={{fontSize:13,padding:7}}/>
                          <select className="inp" value={ec} onChange={e=>setEc(e.target.value)} style={{fontSize:13,padding:7}}>
                            {CS.map(c=><option key={c} value={c}>{c}</option>)}</select>
                          <div style={{display:"flex",gap:4}}>
                            <button className="btn-a" onClick={sve} style={{flex:1,background:"#06D6A0",color:"#fff",padding:7,fontSize:12,borderRadius:6}}>✓</button>
                            <button className="btn-a" onClick={()=>setEi(null)} style={{flex:1,background:"#eee",color:"#666",padding:7,fontSize:12,borderRadius:6}}>✕</button>
                          </div>
                        </div>
                      ):(
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          {LOGOS[v.c]&&<img src={LOGOS[v.c]} alt="" style={{width:22,height:22,borderRadius:5}}/>}
                          <div style={{flex:1,fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v.n||v.c}</div>
                          <button className="btn-a" onClick={()=>se(v)} style={{background:"#eef5ff",color:"#0078B3",padding:"4px 8px",fontSize:11,borderRadius:5}}>✏️</button>
                          <button className="btn-a" onClick={()=>rmv(v.id)} style={{background:"#fee",color:"#e55",padding:"4px 8px",fontSize:11,borderRadius:5}}>🗑️</button>
                        </div>
                      )}
                    </div>)}
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
